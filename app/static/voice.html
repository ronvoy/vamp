<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vamp — Voice App Maker Pro</title>
  <style>
    :root {
      --bg: #fff;
      --bg-secondary: #f8f9fa;
      --bg-sidebar-rail: #e9ecef;
      --text: #333;
      --text-muted: #666;
      --border: #dee2e6;
      --output-bg: #f5f5f5;
      --path-color: #27ae60;
      --record-bg: #e74c3c;
      --record-bg-hover: #c0392b;
    }
    body.dark {
      --bg: #1a1a1a;
      --bg-secondary: #2d2d2d;
      --bg-sidebar-rail: #252525;
      --text: #e8e8e8;
      --text-muted: #a0a0a0;
      --border: #404040;
      --output-bg: #2a2a2a;
      --path-color: #34d399;
      --record-bg: #dc2626;
      --record-bg-hover: #b91c1c;
    }

    * { box-sizing: border-box; }
    body { font-family: system-ui; margin: 0; min-height: 100vh; display: flex; background: var(--bg); color: var(--text); transition: background 0.2s, color 0.2s; }

    #sidebar-rail {
      position: fixed; top: 0; left: 0; bottom: 0; width: 5rem;
      background: var(--bg-sidebar-rail); z-index: 9;
      display: flex; align-items: flex-start; padding-top: 1rem; padding-left: 0.5rem;
    }
    body.sidebar-open #sidebar-rail { width: 0; overflow: hidden; padding: 0; }

    .main { flex: 1; padding: 2rem; max-width: 600px; min-width: 0; margin-left: 5rem; transition: margin-left 0.2s ease; }
    body.sidebar-open .main { margin-left: min(300px, 85vw); }
    @media (max-width: 768px) {
      #sidebar-rail { width: 3.5rem; padding-left: 0.35rem; }
      .main { margin-left: 3.5rem; padding: 1rem; padding-top: 2.5rem; }
      body.sidebar-open .main { margin-left: 0; }
      h1 { font-size: 1.5rem; }
    }

    h1 { color: var(--text); margin-top: 0; }
    button { padding: 0.75rem 1.5rem; font-size: 1rem; cursor: pointer; border-radius: 8px; border: none; }
    #record-wrap { margin-top: 0.5rem; }
    #record { background: var(--record-bg); color: white; width: 100%; max-width: 280px; }
    #record.recording { background: var(--record-bg-hover); animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: 0.8; } }
    #live-transcript {
      margin-top: 1rem; min-height: 60px; padding: 1rem; background: var(--output-bg);
      border-radius: 8px; font-size: 0.95rem; white-space: pre-wrap; color: var(--text);
    }
    #live-transcript.recording:empty::before { content: 'Listening...'; color: var(--text-muted); font-style: italic; }
    #preview-box {
      display: none; margin-top: 1rem; padding: 1rem; background: var(--output-bg);
      border-radius: 8px; border: 1px solid var(--border);
    }
    #preview-box.visible { display: block; }
    #preview-text { font-size: 0.95rem; white-space: pre-wrap; margin-bottom: 1rem; }
    #preview-actions { display: flex; gap: 0.5rem; }
    #btn-send { background: var(--path-color); color: white; }
    #btn-cancel { background: var(--border); color: var(--text); }
    #output { margin-top: 1rem; padding: 1rem; background: var(--output-bg); border-radius: 8px; white-space: pre-wrap; font-size: 0.9rem; }
    .path { color: var(--path-color); font-weight: bold; }

    #open-history {
      position: relative; left: 0;
      padding: 0.5rem 0.75rem; font-size: 0.9rem; background: var(--bg-secondary);
      color: var(--text); border: 1px solid var(--border); border-radius: 6px;
      cursor: pointer; display: flex; align-items: center; gap: 0.25rem;
    }
    #open-history:hover { filter: brightness(0.95); }
    body.sidebar-open #open-history { display: none; }
    #open-history .label { }
    @media (max-width: 768px) {
      #open-history .label { display: none; }
    }

    #theme-toggle {
      position: fixed; top: 1rem; right: 1rem; z-index: 11;
      padding: 0.5rem 0.75rem; font-size: 1rem; background: var(--bg-secondary);
      color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; cursor: pointer;
    }
    #theme-toggle:hover { filter: brightness(0.95); }
    @media (max-width: 768px) {
      #theme-toggle { top: 0.5rem; right: 0.5rem; padding: 0.4rem 0.6rem; font-size: 1.1rem; }
    }

    #sidebar {
      width: min(300px, 85vw); min-height: 100vh; background: var(--bg-secondary);
      border-right: 1px solid var(--border); padding: 1rem;
      position: fixed; top: 0; left: 0; z-index: 10;
      transform: translateX(-100%); transition: transform 0.2s ease;
      display: flex; flex-direction: column; overflow: hidden;
    }
    body.sidebar-open #sidebar { transform: translateX(0); }
    @media (max-width: 768px) {
      #sidebar { width: 85vw; }
      body.sidebar-open .main { padding-left: 1rem; }
    }

    #sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    #sidebar-header h3 { margin: 0; font-size: 1rem; color: var(--text); }
    #sidebar-close {
      padding: 0.35rem 0.6rem; font-size: 0.85rem; background: var(--border);
      color: var(--text); border-radius: 6px; cursor: pointer; border: none;
      display: flex; align-items: center; gap: 0.25rem;
    }
    #sidebar-close:hover { filter: brightness(0.9); }
    @media (max-width: 768px) {
      #sidebar-close .label { display: none; }
    }

    #history-search {
      width: 100%; padding: 0.5rem 0.75rem; font-size: 0.9rem;
      border: 1px solid var(--border); border-radius: 6px; margin-bottom: 1rem;
      background: var(--bg); color: var(--text);
    }
    #history-search::placeholder { color: var(--text-muted); }
    #history-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex: 1; }
    #history-list li {
      padding: 0.6rem 0; border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 0.2rem; cursor: default;
    }
    #history-list li:last-child { border-bottom: none; }
    .history-task { font-weight: 500; font-size: 0.9rem; color: var(--text); }
    .history-meta { font-size: 0.75rem; color: var(--text-muted); }
    .history-folder { font-family: monospace; font-size: 0.8rem; color: var(--path-color); }
    .history-empty { color: var(--text-muted); font-style: italic; padding: 1rem 0; }
  </style>
</head>
<body>
  <div id="sidebar-rail">
    <button id="open-history" title="Open chat history"><span class="icon">☰</span><span class="label">History</span></button>
  </div>

  <button id="theme-toggle" title="Toggle theme">🌓</button>

  <aside id="sidebar">
    <div id="sidebar-header">
      <h3>Chat history</h3>
      <button id="sidebar-close" title="Close"><span class="icon">✕</span><span class="label">Close</span></button>
    </div>
    <input type="text" id="history-search" placeholder="Search chats..." autocomplete="off" />
    <ul id="history-list"></ul>
  </aside>

  <div class="main">
    <h1>Vamp — Voice App Maker Pro</h1>
    <p>Say your task. Include agent: &quot;use GPT&quot;, &quot;Claude build&quot;, etc.</p>
    <div id="record-wrap">
      <button id="record">Hold to record</button>
    </div>
    <div id="live-transcript"></div>
    <div id="preview-box">
      <div id="preview-text"></div>
      <div id="preview-actions">
        <button id="btn-send">Send</button>
        <button id="btn-cancel">Cancel</button>
      </div>
    </div>
    <div id="output"></div>
  </div>

  <script>
    const API = window.location.origin;
    const rec = document.getElementById('record');
    const recordWrap = document.getElementById('record-wrap');
    const liveTranscript = document.getElementById('live-transcript');
    const previewBox = document.getElementById('preview-box');
    const previewText = document.getElementById('preview-text');
    const btnSend = document.getElementById('btn-send');
    const btnCancel = document.getElementById('btn-cancel');
    const out = document.getElementById('output');
    const searchInput = document.getElementById('history-search');
    const historyList = document.getElementById('history-list');
    const openBtn = document.getElementById('open-history');
    const closeBtn = document.getElementById('sidebar-close');
    const themeBtn = document.getElementById('theme-toggle');

    let allItems = [], searchTimeout;
    let pendingTranscript = null;
    let SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    let speechRec = null;

    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
    themeBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
      themeBtn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌓';
    });
    themeBtn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌓';

    rec.addEventListener('mousedown', (e) => { e.preventDefault(); start(e); });
    rec.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });

    openBtn.addEventListener('click', () => document.body.classList.add('sidebar-open'));
    closeBtn.addEventListener('click', () => document.body.classList.remove('sidebar-open'));

    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(renderFilteredList, 150);
    });

    function onPointerUp(e) {
      document.removeEventListener('mouseup', onPointerUp);
      document.removeEventListener('touchend', onPointerUp);
      document.removeEventListener('touchcancel', onPointerUp);
      if (!rec?._recorder || rec._recorder.state === 'inactive') return;
      rec._recorder.stop();
      rec._recorder.stream.getTracks().forEach(t => t.stop());
    }

    function start(e) {
      if (!rec) return;
      navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
        try {
          const mediaRecorder = new MediaRecorder(stream);
          let chunks = [];
          mediaRecorder.ondataavailable = ev => ev.data.size && chunks.push(ev.data);
          mediaRecorder.onstop = () => { rec._chunks = chunks; rec._recorder = null; processRecording(chunks); };
          mediaRecorder.start();
          rec._recorder = mediaRecorder;
          rec._chunks = chunks;
          if (recordWrap) recordWrap.classList.add('recording');
          rec.classList.add('recording');
          rec.textContent = 'Recording... release when done';
          if (liveTranscript) { liveTranscript.textContent = ''; liveTranscript.classList.add('recording'); }
          startLiveTranscript();
          document.addEventListener('mouseup', onPointerUp);
          document.addEventListener('touchend', onPointerUp);
          document.addEventListener('touchcancel', onPointerUp);
        } catch (err) {
          stream.getTracks().forEach(t => t.stop());
          if (out) out.textContent = 'Error: ' + (err?.message || err);
        }
      }).catch(ev => { if (out) out.textContent = 'Mic error: ' + (ev?.message || ev); });
    }

    async function processRecording(chunks) {
      if (recordWrap) recordWrap.classList.remove('recording');
      rec.classList.remove('recording');
      rec.textContent = 'Hold to record';
      stopLiveTranscript();
      if (liveTranscript) { liveTranscript.textContent = ''; liveTranscript.classList.remove('recording'); }
      if (!chunks?.length) return;

      if (previewBox) previewBox.classList.remove('visible');
      if (out) out.textContent = 'Transcribing...';

      const blob = new Blob(chunks, { type: 'audio/webm' });
      const fd = new FormData();
      fd.append('audio', blob, 'recording.webm');
      try {
        const r = await fetch(API + '/api/transcribe', { method: 'POST', body: fd });
        const data = await r.json();
        if (data.error) { if (out) out.textContent = 'Error: ' + data.error; return; }
        pendingTranscript = data;
        if (previewText) previewText.textContent = data.text || '(no speech detected)';
        if (previewBox) previewBox.classList.add('visible');
        if (out) out.textContent = '';
      } catch (e) {
        if (out) out.textContent = 'Error: ' + (e?.message || e);
      }
    }

    btnSend.addEventListener('click', async () => {
      if (!pendingTranscript) return;
      const { text, task, agent } = pendingTranscript;
      if (!task && !text) { if (out) out.textContent = 'No task to send.'; return; }
      if (previewBox) previewBox.classList.remove('visible');
      pendingTranscript = null;
      if (out) out.textContent = 'Generating...';
      try {
        const r = await fetch(API + '/api/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ task: task || text, agent }) });
        const data = await r.json();
        if (data.error) { if (out) out.textContent = 'Error: ' + data.error; return; }
        if (out) out.innerHTML = 'Task: ' + (task || text) + '\nAgent: ' + agent + '\n<span class="path">Saved: ' + (data.path || data.folder) + '</span>';
      } catch (e) { if (out) out.textContent = 'Error: ' + (e?.message || e); }
      loadHistory();
    });

    btnCancel.addEventListener('click', () => {
      if (previewBox) previewBox.classList.remove('visible');
      pendingTranscript = null;
      if (out) out.textContent = '';
    });

    function startLiveTranscript() {
      if (liveTranscript) liveTranscript.textContent = '';
      if (!SpeechRec) { if (liveTranscript) liveTranscript.textContent = 'Speaking... (server will transcribe after release)'; return; }
      try {
        speechRec = new SpeechRec();
      } catch (err) { return; }
      speechRec.continuous = true;
      speechRec.interimResults = true;
      speechRec.lang = 'en-US';
      speechRec.onresult = (e) => {
        let full = '', interim = '';
        for (let i = 0; i < e.results.length; i++) {
          const t = e.results[i][0].transcript;
          if (e.results[i].isFinal) full += t;
          else interim = t;
        }
        if (liveTranscript) liveTranscript.textContent = full + interim;
      };
      try { speechRec.start(); } catch (err) { /* ignore */ }
    }
    function stopLiveTranscript() {
      if (speechRec) { speechRec.stop(); speechRec = null; }
    }


    async function loadHistory() {
      try {
        const r = await fetch(API + '/api/history');
        allItems = await r.json();
        renderFilteredList();
      } catch (e) {
        historyList.innerHTML = '<li class="history-empty">Could not load history.</li>';
      }
    }

    function renderFilteredList() {
      const q = searchInput.value.trim().toLowerCase();
      const filtered = q
        ? allItems.filter(({ task, agent, folder }) =>
            (task || '').toLowerCase().includes(q) ||
            (agent || '').toLowerCase().includes(q) ||
            (folder || '').toLowerCase().includes(q)
          )
        : allItems;

      historyList.innerHTML = filtered.length
        ? filtered.map(({ folder, task, agent, created }) => {
            const date = created ? new Date(created).toLocaleString() : folder.slice(0, 16);
            return `<li>
              <span class="history-task">${escapeHtml(task || '(no task)')}</span>
              <span class="history-meta">${escapeHtml(agent)} · ${date}</span>
              <span class="history-folder">${escapeHtml(folder)}</span>
            </li>`;
          }).join('')
        : '<li class="history-empty">' + (q ? 'No matches for "' + escapeHtml(q) + '".' : 'No past sessions yet. Record your first task.') + '</li>';
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    loadHistory();
  </script>
</body>
</html>
