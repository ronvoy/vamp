<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VAMP — Voice App Maker Pro</title>
  <style>
    :root {
      --bg: #fff;
      --bg-secondary: #f8f9fa;
      --text: #333;
      --text-muted: #666;
      --border: #dee2e6;
      --output-bg: #f5f5f5;
      --path-color: #27ae60;
      --record-bg: #e74c3c;
      --record-bg-hover: #c0392b;
    }
    body.dark {
      --bg: #1a1a1a;
      --bg-secondary: #2d2d2d;
      --text: #e8e8e8;
      --text-muted: #a0a0a0;
      --border: #404040;
      --output-bg: #2a2a2a;
      --path-color: #34d399;
      --record-bg: #dc2626;
      --record-bg-hover: #b91c1c;
    }

    * { box-sizing: border-box; }
    body { font-family: system-ui; margin: 0; min-height: 100vh; display: flex; background: var(--bg); color: var(--text); transition: background 0.2s, color 0.2s; }

    #sidebar-rail {
      position: fixed; top: 0; left: 0; bottom: 0; width: 5rem;
      background: var(--bg); z-index: 9;
      display: flex; align-items: flex-start; padding-top: 1rem; padding-left: 0.5rem;
    }
    body.sidebar-open #sidebar-rail { width: 0; overflow: hidden; padding: 0; }

    .main { flex: 1; width: 100%; max-width: 100%; padding: 2rem; padding-top: 3.5rem; padding-right: 4rem; min-width: 0; margin-left: 5rem; transition: margin-left 0.2s ease; }
    body.sidebar-open .main { margin-left: min(300px, 85vw); }
    @media (max-width: 768px) {
      #sidebar-rail { width: 3.5rem; padding-left: 0.35rem; }
      .main { margin-left: 3.5rem; padding: 1rem; padding-top: 3rem; width: 100%; }
      body.sidebar-open .main { margin-left: 0; padding-left: 1rem; padding-right: 3rem; }
      .main { padding-right: 3rem; }
      h1 { font-size: 1.5rem; }
      .detail-panel.visible { padding: 0.75rem; }
    }

    h1 { color: var(--text); margin-top: 0; }
    button { padding: 0.75rem 1.5rem; font-size: 1rem; cursor: pointer; border-radius: 8px; border: none; }
    #record-wrap { margin-top: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
    #record { background: var(--record-bg); color: white; width: 100%; max-width: 280px; }
    #record.recording { background: var(--record-bg-hover); animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: 0.8; } }
    #preview-box {
      display: none; margin-top: 1rem; padding: 1rem; background: var(--output-bg);
      border-radius: 8px; border: 1px solid var(--border);
    }
    #preview-box.visible { display: block; }
    #preview-text { font-size: 0.95rem; width: 100%; min-height: 80px; padding: 0.75rem; margin-bottom: 1rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); resize: vertical; font-family: inherit; }
    #preview-actions { display: flex; gap: 0.5rem; }
    #btn-send { background: var(--path-color); color: white; }
    #btn-cancel { background: var(--border); color: var(--text); }
    #btn-clear { padding: 0.6rem; background: transparent; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 1.1rem; color: var(--text-muted); }
    #btn-clear:hover { background: var(--output-bg); color: var(--text); }
    #btn-continue { padding: 0.6rem; background: transparent; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 1.1rem; color: var(--text-muted); display: none; }
    #btn-continue.visible { display: inline-flex; }
    #btn-continue:hover { background: var(--output-bg); color: var(--text); }
    #output { margin-top: 1rem; }
    .path { color: var(--path-color); font-weight: bold; }
    .response-card {
      background: var(--output-bg); border-radius: 8px; padding: 1rem; margin-bottom: 1rem;
      border: 1px solid var(--border);
    }
    .response-card h4 { margin: 0 0 0.5rem 0; font-size: 0.95rem; }
    .response-condensed { font-size: 0.85rem; color: var(--text-muted); max-height: 4em; overflow: hidden; text-overflow: ellipsis; }
    .response-toggle { font-size: 0.8rem; cursor: pointer; color: var(--path-color); margin-top: 0.3rem; }
    .response-toggle:hover { text-decoration: underline; }
    .response-expanded { display: none; margin-top: 1rem; }
    .response-expanded.visible { display: block; }
    .code-block { background: #1e1e1e; color: #d4d4d4; padding: 0.75rem; border-radius: 6px; overflow-x: auto; font-family: 'Consolas','Monaco',monospace; font-size: 0.8rem; white-space: pre; }
    body.dark .code-block { background: #0d0d0d; color: #e0e0e0; }
    .detail-panel { display: none; width: 100%; box-sizing: border-box; }
    .detail-panel.visible { display: block; width: 100%; margin-top: 1rem; padding: 1rem; background: var(--output-bg); border-radius: 8px; border: 1px solid var(--border); }
    .detail-panel h3 { margin: 0 0 0.75rem 0; font-size: 1rem; }
    .detail-actions { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
    .detail-actions input { padding: 0.4rem 0.5rem; border: 1px solid var(--border); border-radius: 6px; flex: 1; min-width: 120px; }
    .history-item { cursor: pointer; }
    .history-item:hover { background: var(--output-bg); }

    #open-history {
      position: relative; left: 0;
      padding: 0.5rem 0.75rem; font-size: 0.9rem; background: var(--bg-secondary);
      color: var(--text); border: 1px solid var(--border); border-radius: 6px;
      cursor: pointer; display: flex; align-items: center; gap: 0.25rem;
    }
    #open-history:hover { filter: brightness(0.95); }
    body.sidebar-open #open-history { display: none; }
    #open-history .label { }
    @media (max-width: 768px) {
      #open-history .label { display: none; }
    }

    #theme-toggle {
      position: fixed; top: 1rem; right: 1rem; z-index: 11;
      padding: 0.5rem 0.75rem; font-size: 1rem; background: var(--bg-secondary);
      color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; cursor: pointer;
    }
    #theme-toggle:hover { filter: brightness(0.95); }
    @media (max-width: 768px) {
      #theme-toggle { top: 0.5rem; right: 0.5rem; padding: 0.4rem 0.6rem; font-size: 1.1rem; }
    }

    #sidebar {
      width: min(300px, 85vw); height: 100vh; background: var(--bg-secondary);
      border-right: 1px solid var(--border); padding: 1rem;
      position: fixed; top: 0; left: 0; z-index: 10;
      transform: translateX(-100%); transition: transform 0.2s ease;
      display: flex; flex-direction: column; overflow: hidden;
    }
    #sidebar-inner { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
    body.sidebar-open #sidebar { transform: translateX(0); }
    @media (max-width: 768px) {
      #sidebar { width: 85vw; }
      body.sidebar-open .main { padding-left: 1rem; }
    }

    #sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    #sidebar-header h3 { margin: 0; font-size: 1rem; color: var(--text); }
    #sidebar-close {
      padding: 0.35rem 0.6rem; font-size: 0.85rem; background: var(--border);
      color: var(--text); border-radius: 6px; cursor: pointer; border: none;
      display: flex; align-items: center; gap: 0.25rem;
    }
    #sidebar-close:hover { filter: brightness(0.9); }
    @media (max-width: 768px) {
      #sidebar-close .label { display: none; }
    }

    #history-search {
      width: 100%; padding: 0.5rem 0.75rem; font-size: 0.9rem;
      border: 1px solid var(--border); border-radius: 6px; margin-bottom: 1rem;
      background: var(--bg); color: var(--text);
    }
    #history-search::placeholder { color: var(--text-muted); }
    #history-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex: 1; min-height: 0; }
    #history-list li {
      padding: 0.6rem 0; border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 0.2rem; cursor: pointer;
    }
    #history-list li:last-child { border-bottom: none; }
    .history-task { font-weight: 500; font-size: 0.9rem; color: var(--text); }
    .history-meta { font-size: 0.75rem; color: var(--text-muted); }
    .history-folder { font-family: monospace; font-size: 0.8rem; color: var(--path-color); }
    .history-empty { color: var(--text-muted); font-style: italic; padding: 1rem 0; }
  </style>
</head>
<body>
  <div id="sidebar-rail">
    <button id="open-history" title="Open chat history"><span class="icon">☰</span><span class="label">History</span></button>
  </div>

  <button id="theme-toggle" title="Toggle theme">🌓</button>

  <aside id="sidebar">
    <div id="sidebar-header">
      <h3>Chat history</h3>
      <button id="sidebar-close" title="Close"><span class="icon">✕</span><span class="label">Close</span></button>
    </div>
    <div id="sidebar-inner">
      <input type="text" id="history-search" placeholder="Search chats..." autocomplete="off" />
      <ul id="history-list"></ul>
    </div>
  </aside>

  <div class="main">
    <h1>VAMP — Voice App Maker Pro</h1>
    
    <div id="record-wrap">
      <button id="btn-clear" title="Clear chat & start new">+</button>
      <button id="record">Hold to record</button>
    </div>
    <div id="preview-box">
      <label style="font-size:0.85rem;color:var(--text-muted);margin-bottom:0.25rem;display:block">Type or edit your prompt:</label>
      <textarea id="preview-text"></textarea>
      <div id="preview-actions">
        <button id="btn-send">Send</button>
        <button id="btn-cancel">Cancel</button>
      </div>
    </div>
    <div id="output"></div>
    <div id="detail-panel" class="detail-panel"></div>
  </div>

  <script>
    const API = window.location.origin;
    const rec = document.getElementById('record');
    const recordWrap = document.getElementById('record-wrap');
    const btnClear = document.getElementById('btn-clear');
    const btnContinue = document.getElementById('btn-continue');
    const previewBox = document.getElementById('preview-box');
    const previewText = document.getElementById('preview-text');
    const btnSend = document.getElementById('btn-send');
    const btnCancel = document.getElementById('btn-cancel');
    const out = document.getElementById('output');
    const detailPanel = document.getElementById('detail-panel');
    const searchInput = document.getElementById('history-search');
    const historyList = document.getElementById('history-list');
    const openBtn = document.getElementById('open-history');
    const closeBtn = document.getElementById('sidebar-close');
    const themeBtn = document.getElementById('theme-toggle');

    let allItems = [], searchTimeout;
    let pendingTranscript = null;
    let continueContext = null;

    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
    themeBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
      themeBtn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌓';
    });
    themeBtn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌓';

    rec.addEventListener('mousedown', (e) => { e.preventDefault(); start(e); });
    rec.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });

    openBtn.addEventListener('click', () => document.body.classList.add('sidebar-open'));
    closeBtn.addEventListener('click', () => document.body.classList.remove('sidebar-open'));

    btnClear.addEventListener('click', () => {
      continueContext = null;
      if (btnContinue) btnContinue.classList.remove('visible');
      if (detailPanel) { detailPanel.classList.remove('visible'); detailPanel.innerHTML = ''; }
      if (out) out.innerHTML = '';
      if (previewText) previewText.value = '';
      pendingTranscript = null;
      if (previewBox) { previewBox.classList.add('visible'); previewText?.focus(); }
    });

    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(renderFilteredList, 150);
    });

    function onPointerUp(e) {
      document.removeEventListener('mouseup', onPointerUp);
      document.removeEventListener('touchend', onPointerUp);
      document.removeEventListener('touchcancel', onPointerUp);
      if (!rec?._recorder || rec._recorder.state === 'inactive') return;
      rec._recorder.stop();
      rec._recorder.stream.getTracks().forEach(t => t.stop());
    }

    function start(e) {
      if (!rec) return;
      navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
        try {
          const mediaRecorder = new MediaRecorder(stream);
          let chunks = [];
          mediaRecorder.ondataavailable = ev => ev.data.size && chunks.push(ev.data);
          mediaRecorder.onstop = () => { rec._chunks = chunks; rec._recorder = null; processRecording(chunks); };
          mediaRecorder.start();
          rec._recorder = mediaRecorder;
          rec._chunks = chunks;
          if (recordWrap) recordWrap.classList.add('recording');
          rec.classList.add('recording');
          rec.textContent = 'Recording... release when done';
          document.addEventListener('mouseup', onPointerUp);
          document.addEventListener('touchend', onPointerUp);
          document.addEventListener('touchcancel', onPointerUp);
        } catch (err) {
          stream.getTracks().forEach(t => t.stop());
          if (out) out.textContent = 'Error: ' + (err?.message || err);
        }
      }).catch(ev => { if (out) out.textContent = 'Mic error: ' + (ev?.message || ev); });
    }

    async function processRecording(chunks) {
      if (recordWrap) recordWrap.classList.remove('recording');
      rec.classList.remove('recording');
      rec.textContent = 'Hold to record';
      if (!chunks?.length) return;

      if (previewBox) previewBox.classList.remove('visible');
      if (out) out.textContent = 'Transcribing...';

      const blob = new Blob(chunks, { type: 'audio/webm' });
      const fd = new FormData();
      fd.append('audio', blob, 'recording.webm');
      try {
        const r = await fetch(API + '/api/transcribe', { method: 'POST', body: fd });
        const data = await r.json();
        if (data.error) { if (out) out.textContent = 'Error: ' + data.error; return; }
        pendingTranscript = data;
        if (previewText) previewText.value = data.text || '(no speech detected)';
        if (previewBox) previewBox.classList.add('visible');
        if (out) out.textContent = '';
      } catch (e) {
        if (out) out.textContent = 'Error: ' + (e?.message || e);
      }
    }

    btnSend.addEventListener('click', async () => {
      const editedTask = previewText?.value?.trim() || '';
      if (!editedTask) { if (out) out.textContent = 'No task to send.'; return; }
      if (previewBox) previewBox.classList.remove('visible');
      pendingTranscript = null;
      if (!continueContext) { if (detailPanel) { detailPanel.classList.remove('visible'); detailPanel.innerHTML = ''; } }
      if (out) out.innerHTML = '<span class="path">Generating...</span>';
      const body = { task: editedTask };
      if (continueContext) body.continue_from = continueContext;
      try {
        const r = await fetch(API + '/api/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        const data = await r.json();
        if (data.error) { if (out) out.textContent = 'Error: ' + data.error; return; }
        renderResponse(data, editedTask, data.agent || pendingTranscript?.agent || '');
      } catch (e) { if (out) out.textContent = 'Error: ' + (e?.message || e); }
      loadHistory();
    });

    btnCancel.addEventListener('click', () => {
      if (previewBox) previewBox.classList.remove('visible');
      pendingTranscript = null;
      if (out) out.textContent = '';
    });

    async function loadHistory() {
      try {
        const r = await fetch(API + '/api/history');
        allItems = await r.json();
        renderFilteredList();
      } catch (e) {
        historyList.innerHTML = '<li class="history-empty">Could not load history.</li>';
      }
    }

    function renderFilteredList() {
      const q = searchInput.value.trim().toLowerCase();
      const filtered = q
        ? allItems.filter(({ task, agent, folder }) =>
            (task || '').toLowerCase().includes(q) ||
            (agent || '').toLowerCase().includes(q) ||
            (folder || '').toLowerCase().includes(q)
          )
        : allItems;

      historyList.innerHTML = filtered.length
        ? filtered.map(({ folder, task, agent, created }) => {
            const date = created ? new Date(created).toLocaleString() : folder.slice(0, 16);
            return `<li class="history-item" data-folder="${escapeHtml(folder)}">
              <span class="history-task">${escapeHtml(task || '(no task)')}</span>
              <span class="history-meta">${escapeHtml(agent)} · ${date}</span>
              <span class="history-folder">${escapeHtml(folder)}</span>
            </li>`;
          }).join('')
        : '<li class="history-empty">' + (q ? 'No matches for "' + escapeHtml(q) + '".' : 'No past sessions yet. Record your first task.') + '</li>';
      historyList.querySelectorAll('.history-item').forEach(el => {
        el.addEventListener('click', () => {
          const folder = el.dataset.folder;
          if (!folder) return;
          fetch(API + '/api/conversation/' + encodeURIComponent(folder))
            .then(r => r.json())
            .then(conv => { if (conv.error) return; renderDetailPanel(conv); out.innerHTML = ''; })
            .catch(() => {});
        });
      });
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function renderResponse(data, task, agent) {
      const files = data.files || ['main.py', 'requirements.txt', 'README.md'];
      const reasoning = data.reasoning || '';
      const rawResponse = data.raw_response || '';
      const usage = data.usage || {};
      const usageStr = usage.total_tokens ? `Tokens: ${usage.prompt_tokens || 0} in / ${usage.completion_tokens || 0} out` : '';
      out.innerHTML = `
        <div class="response-card">
          <h4>Saved to <span class="path">${escapeHtml(data.folder || data.path || '')}</span></h4>
          <div class="response-condensed"><strong>Files:</strong> ${escapeHtml(files.join(', '))}</div>
          ${usageStr ? '<div class="response-condensed">' + usageStr + '</div>' : ''}
          ${reasoning ? '<div class="response-condensed">' + escapeHtml(reasoning.slice(0, 120)) + (reasoning.length > 120 ? '…' : '') + '</div>' : ''}
          <div class="response-toggle" data-expanded="0">▼ Show full reasoning & code</div>
          <div class="response-expanded" id="response-expanded">
            ${reasoning ? '<p><strong>Reasoning:</strong></p><pre class="code-block">' + escapeHtml(reasoning) + '</pre>' : ''}
            ${rawResponse ? '<p><strong>Full LLM response:</strong></p><pre class="code-block">' + escapeHtml(rawResponse) + '</pre>' : ''}
          </div>
        </div>`;
      out.querySelector('.response-toggle').addEventListener('click', function() {
        const exp = out.querySelector('#response-expanded');
        const isExp = exp.classList.toggle('visible');
        this.textContent = isExp ? '▲ Hide' : '▼ Show full reasoning & code';
      });
    }

    function renderDetailPanel(conv) {
      if (!detailPanel) return;
      continueContext = conv.folder;
      if (btnContinue) btnContinue.classList.add('visible');
      const meta = conv.metadata || {};
      const files = conv.files || {};
      const fileNames = Object.keys(files);
      const reasoning = meta.reasoning || '';
      const rawResponse = meta.raw_response || '';
      detailPanel.classList.add('visible');
      detailPanel.innerHTML = `
        <h3>${escapeHtml(meta.task || conv.folder)}</h3>
        <div><small>${escapeHtml(meta.agent || '')} · ${escapeHtml(conv.folder)}</small></div>
        <p><strong>Files:</strong> ${escapeHtml(fileNames.join(', '))}</p>
        ${reasoning ? '<p class="response-condensed">' + escapeHtml(reasoning.slice(0, 150)) + (reasoning.length > 150 ? '…' : '') + '</p>' : ''}
        <div class="response-toggle" id="detail-expand">▼ Show code & full reasoning</div>
        <div class="response-expanded" id="detail-expanded">
          ${Object.entries(files).map(([name, content]) => '<p><strong>' + escapeHtml(name) + '</strong></p><pre class="code-block">' + escapeHtml(content) + '</pre>').join('')}
          ${reasoning ? '<p><strong>Reasoning:</strong></p><pre class="code-block">' + escapeHtml(reasoning) + '</pre>' : ''}
          ${rawResponse ? '<p><strong>Full response:</strong></p><pre class="code-block">' + escapeHtml(rawResponse) + '</pre>' : ''}
        </div>
        <div class="detail-actions">
          <input type="text" id="rename-input" placeholder="New name" value="${escapeHtml((conv.folder || '').replace(/^\d{4}-\d{2}-\d{2}_\d{4}_/, ''))}" />
          <button id="btn-rename">Rename</button>
          <button id="btn-delete" style="background:#c0392b;color:white">Delete</button>
        </div>`;
      detailPanel.querySelector('#detail-expand').addEventListener('click', function() {
        const exp = detailPanel.querySelector('#detail-expanded');
        const isExp = exp.classList.toggle('visible');
        this.textContent = isExp ? '▲ Hide' : '▼ Show code & full reasoning';
      });
      detailPanel.querySelector('#btn-rename').addEventListener('click', async () => {
        const newName = detailPanel.querySelector('#rename-input').value.trim();
        if (!newName) return;
        try {
          const r = await fetch(API + '/api/conversation/' + encodeURIComponent(conv.folder) + '/rename', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: newName }) });
          const d = await r.json();
          if (d.error) { alert(d.error); return; }
          loadHistory();
          const r2 = await fetch(API + '/api/conversation/' + encodeURIComponent(d.folder));
          const conv2 = await r2.json();
          if (!conv2.error) renderDetailPanel(conv2);
        } catch (e) { alert(e.message); }
      });
      detailPanel.querySelector('#btn-delete').addEventListener('click', async () => {
        if (!confirm('Delete this project and all its files?')) return;
        try {
          const r = await fetch(API + '/api/conversation/' + encodeURIComponent(conv.folder), { method: 'DELETE' });
          const d = await r.json();
          if (d.ok) { continueContext = null; if (btnContinue) btnContinue.classList.remove('visible'); detailPanel.classList.remove('visible'); detailPanel.innerHTML = ''; out.innerHTML = ''; loadHistory(); }
          else alert(d.error || 'Delete failed');
        } catch (e) { alert(e.message); }
      });
    }

    loadHistory();
  </script>
</body>
</html>
